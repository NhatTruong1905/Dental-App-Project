{% extends 'layout/base.html' %}

{% block title %}Tạo hồ sơ bệnh nhân{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7 col-sm-10">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-primary">Tạo hồ sơ bệnh nhân</h3>
                    </div>
                    {% if err_msg %}
                    <div class="alert alert-danger text-center mb-4">
                        {{ err_msg }}
                    </div>
                    {% endif %}
                    <form method="post" action="/patients?next=/appointment">

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="name" name="name" placeholder="Họ tên" required>
                            <label for="name">Họ tên</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="phone" name="phone" placeholder="Số điện thoại" required>
                            <label for="phone">Số điện thoại</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="date" class="form-control" id="birthday" name="birthday" required>
                            <label for="birthday">Ngày sinh</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="address" name="address" placeholder="Địa chỉ" required>
                            <label for="address">Địa chỉ</label>
                        </div>
                        <div class="form-floating mb-4">
                            <textarea class="form-control" id="medical_history" name="medical_history" placeholder="Tiền sử bệnh án" style="height: 100px"></textarea>
                            <label for="medical_history">Tiền sử bệnh án</label>
                        </div>
                        <div class="d-grid gap-3">
                            <button type="submit" class="btn btn-primary btn-lg shadow">Xác nhận</button>
                            <a href="/appointment" class="btn btn-outline-secondary">Quay lại</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
