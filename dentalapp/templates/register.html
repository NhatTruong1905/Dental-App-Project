{%extends 'layout/base.html'%}

{% block title %}Đăng ký{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-4 col-sm-8">
            <div class="card shadow-lg">
                <div class="card-body">

                    <h3 class="text-center text-primary mb-4">
                        Đăng ký người dùng
                    </h3>

                    {% if err_msg %}
                    <div class="alert alert-danger">{{err_msg}}</div>
                    {% endif %}

                    <form method="post" action="/register?next=/login" enctype="multipart/form-data">

                        <div class="form-floating mb-3 mt-3">
                            <input type="text" class="form-control" id="name" placeholder="Họ tên" name="name" required />
                            <label for="name">Họ tên</label>
                        </div>

                        <div class="form-floating mb-3 mt-3">
                            <input type="text" class="form-control" id="phone" placeholder="Số điện thoại" name="sdt" required />
                            <label for="phone">Số điện thoại</label>
                        </div>

                        <div class="form-floating mt-3 mb-3">
                            <input type="password" class="form-control" id="pwd" placeholder="Mật khẩu" name="password" required />
                            <label for="pwd">Mật khẩu</label>
                        </div>

                        <div class="form-floating mt-3 mb-3">
                            <input type="password" class="form-control" id="confirm" placeholder="Xác nhận mật khẩu" name="confirm" required />
                            <label for="confirm">Xác nhận mật khẩu</label>
                        </div>

                        <div class="form-floating mt-3 mb-3">
                            <input type="file" class="form-control" id="avatar" name="avatar" required />
                            <label for="avatar">Ảnh đại diện</label>
                        </div>

                        <div class="form-floating mt-3 mb-3">
                            <button type="submit" class="btn btn-danger">Đăng ký</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
