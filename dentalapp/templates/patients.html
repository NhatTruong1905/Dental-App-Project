{% extends 'layout/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-info fw-bold mb-0">Hồ sơ bệnh nhân</h2>
        <a href="/patients/new" class="btn btn-primary shadow">Tạo hồ sơ</a>
    </div>

    {% if patients %}
    <div class="row">
        {% for p in patients %}
        <div id="patient{{ p.id }}" class="col-lg-4 col-md-6 col-sm-12 p-3">

            <div class="card shadow-sm border-0 h-100 rounded-4 position-relative">
                <button type="button" class="btn btn-sm btn-danger position-absolute top-0 end-0 m-2 " onclick="deletePatient({{ p.id }})" title="Xóa hồ sơ"><i class="fa-solid fa-xmark"></i></button>

                <div class="card-body text-center">
                    <img src="https://ui-avatars.com/api/?name={{ p.name }}&background=0D6EFD&color=fff&size=96" class="rounded-circle mb-3 shadow-sm" alt="Avatar">
                    <h5 class="fw-bold mb-3">{{ p.name }}</h5>
                    <div class="d-flex justify-content-center gap-2">
                        <a href="/patients/{{ p.id }}" class="btn btn-primary btn-sm">Xem</a>
                        <button class="btn btn-success btn-sm">Chọn</button>
                    </div>
                </div>
            </div>

        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="alert alert-danger text-center mt-4">
        <i class="fa-solid fa-circle-exclamation me-2"></i>
        Không có hồ sơ nào!
    </div>
    {% endif %}
</div>

<script src="{{ url_for('static', filename='js/patients.js') }}"></script>
{% endblock %}
