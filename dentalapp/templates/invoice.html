{% extends 'layout/base.html' %}

{% block title %}Lập hóa đơn{% endblock %}

{% block content %}
    <div class="container my-5">
        <h2 class="text-center text-primary fw-bold mb-5">
            Hoá đơn
        </h2>
    </div>

    <div class="row">
        <div class="col-md-3">
            <div class="card shadow border-0 rounded-4 mb-4" data-step="4">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">Chọn ngày khám</h5>
                    <input id="date" type="date" class="form-control" name="check_date"
                           onchange="loadAppointmentSuccess(this.value)">
                </div>
            </div>
        </div>
        <div class="col-md-5">
            <div class="card shadow border-0 rounded-4 mb-4" data-step="1">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">Chọn lịch khám</h5>
                    <select id="select-appointment" class="form-select">
                        <option id="selected-appointment" selected disabled>-- Chọn lịch khám --</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow border-0 rounded-4 mb-4" data-step="1">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="fw-bold mb-3">Chọn bệnh nhân</h5>
                    </div>
                    <div id="patient-info">

                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-3">
            <div class="card shadow border-0 rounded-4 mb-4" data-step="1">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">Tổng dịch vụ</h5>

                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow border-0 rounded-4 mb-4" data-step="4">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">Thuốc</h5>

                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow border-0 rounded-4 mb-4" data-step="3">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">VAT (10%)</h5>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow border-0 rounded-4 mb-4" data-step="3">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">Tổng thanh toán</h5>
                </div>
            </div>

        </div>
    </div>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        getPatientFromAppointment();
    })
</script>
{% endblock %}
