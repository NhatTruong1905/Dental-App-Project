{% extends 'layout/base.html' %}

{% block title %}Lập hóa đơn{% endblock %}

{% block content %}
    <div class="container my-5">
        <h2 class="text-center text-primary fw-bold mb-5">
            Hoá đơn
        </h2>
    </div>
    <div id="alert-appointment" class="alert alert-danger text-center mb-4 d-none"></div>
    <div class="row">
        <div class="col-md-5">
            <div class="card shadow border-0 rounded-4 mb-4" data-step="4">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">Chọn ngày khám</h5>
                    <input id="date" type="date" class="form-control" name="check_date"
                           onchange="loadAppointmentSuccess(this.value)">
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow border-0 rounded-4 mb-4" data-step="1">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">Chọn lịch khám</h5>
                    <select id="select-appointment" class="form-select"
                            onchange="finalResult()">
                        <option id="selected-appointment" selected disabled>-- Chọn lịch khám --</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0">Tổng dịch vụ:</h5>
            <select id="select-services-list" class="form-select ms-2"
                    style="width: auto; min-width: 150px;">
                <option id="selected-service" selected disabled>-- Các dịch vụ --</option>
            </select>
        </div>
        <p class="fs-4 fw-semibold text-primary mb-0" id="total-services">0 VNĐ</p>
    </div>

    <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0">Thuốc:</h5>
            <select id="select-medicines-list" class="form-select ms-2"
                    style="width: auto; min-width: 150px;">
                <option id="selected-medicine" selected disabled>-- Các loại thuốc --</option>
            </select>
        </div>
        <p class="fs-4 fw-semibold text-primary mb-0" id="total-medicines">0 VNĐ</p>
    </div>

    <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0">VAT (10%):</h5>
        </div>
        <p class="fs-4 fw-semibold text-primary mb-0" id="total-vat">0 VNĐ</p>
    </div>


    <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0">Tổng cộng:</h5>
        </div>
        <p class="fs-4 fw-bold text-success mb-0" id="total-result">0 VNĐ</p>
    </div>


    <div class="text-center mt-5">
        <button class="btn btn-success btn-lg px-5" onclick="saveInvoice()">Lưu hóa đơn</button>
    </div>

{% endblock %}
