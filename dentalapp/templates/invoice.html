{% extends 'layout/base.html' %}

{% block title %}Lập hóa đơn{% endblock %}

{% block content %}
<div class="container my-5">
    <h2 class="text-center text-primary fw-bold mb-5">Hoá đơn</h2>
    <div id="alert-appointment" class="alert alert-danger text-center mb-4 d-none"></div>

    <div class="row mb-4">
        <div class="col-md-5">
            <div class="card shadow border-0 rounded-4" data-step="4">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">Chọn ngày khám</h5>
                    <input id="date" type="date" class="form-control" name="check_date" onchange="loadAppointmentSuccess(this.value)">
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card shadow border-0 rounded-4" data-step="1">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">Chọn lịch khám</h5>
                    <select id="select-appointment" class="form-select" onchange="finalResult()">
                        <option id="selected-appointment" selected disabled>-- Chọn lịch khám --</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow border-0 rounded-4 mb-4">
        <div class="card-body">
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Tên dịch vụ</th>
                        <th>Giá</th>
                    </tr>
                </thead>
                <tbody id="list-services"></tbody>
            </table>

            <h5 class="fw-bold mb-0">Tổng dịch vụ:</h5>
            <p class="fs-4 fw-semibold text-primary mb-0" id="total-services" data-totalservice="0">0 VNĐ</p>
        </div>
    </div>

    <div class="card shadow border-0 rounded-4 mb-4">
        <div class="card-body">
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Tên thuốc</th>
                        <th>Giá</th>
                        <th>Liều dùng (viên/ngày)</th>
                        <th>Số ngày</th>
                    </tr>
                </thead>
                <tbody id="list-medicines" data-total="0"></tbody>
            </table>

            <h5 class="fw-bold mb-0">Tổng thuốc:</h5>
            <p class="fs-4 fw-semibold text-primary mb-0" id="total-medicines" data-totalmedicines="0">0 VNĐ</p>
        </div>
    </div>

    <div class="card shadow border-0 rounded-4 mb-4">
        <div class="card-body">
            <h5 class="fw-bold mb-2">VAT (10%):</h5>
            <p class="fs-4 fw-semibold text-primary mb-0" id="total-vat" data-totalvat="0">0 VNĐ</p>
        </div>
    </div>

    <div class="card shadow border-0 rounded-4 mb-5">
        <div class="card-body">
            <h5 class="fw-bold mb-2">Tổng cộng:</h5>
            <p class="fs-4 fw-bold text-success mb-0" id="total-result" data-totalresult="0">0 VNĐ</p>
        </div>
    </div>

    <div class="text-center">
        <button class="btn btn-success btn-lg px-5" onclick="saveInvoice()">Lưu hóa đơn</button>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    getPatientFromAppointment();
});
</script>
{% endblock %}
