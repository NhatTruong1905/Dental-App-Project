{% extends 'layout/base.html' %}

{% block title %}Đổi mật khẩu{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center align-items-center">
        <div class="col-lg-4 col-md-6 col-sm-10">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">

                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-primary">Đổi mật khẩu</h3>
                    </div>

                    <form method="post" action="/password?next=/">

                        {% if err_msg %}
                        <div class="alert alert-danger text-center mb-4">{{ err_msg }}</div>
                        {% endif %}

                        <input type="hidden" name="login_type" value="user">

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="curr_pwd" name="current_password" placeholder="Mật khẩu hiện tại" required>
                            <label for="curr_pwd">Mật khẩu hiện tại</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="new_pwd" name="new_password" placeholder="Mật khẩu mới" required>
                            <label for="new_pwd">Mật khẩu mới</label>
                        </div>

                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="confirm_pwd" name="confirm_password" placeholder="Xác nhận mật khẩu" required>
                            <label for="confirm_pwd">Xác nhận mật khẩu</label>
                        </div>

                        <div class="d-grid gap-3">
                            <button type="submit" class="btn btn-primary btn-lg shadow"><i class="fa-solid fa-check me-1"></i> Xác nhận</button>
                            <a href="/" class="btn btn-outline-secondary">Quay lại</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
