{% extends 'layout/base.html' %}

{% block title %}Đổi mật khẩu{% endblock %}

{% block content %}
<div class="container">
<div class="row justify-content-center align-items-center mt-5">
    <div class="col-md-4 col-sm-8">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4">

                <h3 class="text-center text-primary mb-4 fw-bold">Đổi mật khẩu</h3>

                <form method="post" action="/change_password?next=/">
                    {% if err_msg %}
                    <div class="alert alert-danger text-center">
                        {{ err_msg }}
                    </div>
                    {% endif %}

                    <input type="hidden" name="login_type" value="user">

                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="curr_pwd" placeholder="Mật khẩu hiện tại" name="current_password" required>
                        <label for="curr_pwd">Mật khẩu hiện tại</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="new_pwd" placeholder="Mật khẩu mới" name="new_password" required>
                        <label for="new_pwd">Mật khẩu mới</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="confirm_pwd" placeholder="Xác nhận mật khẩu" name="confirm_password" required>
                        <label for="confirm_pwd">Xác nhận mật khẩu</label>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Xác nhận</button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

</div>
{% endblock %}
